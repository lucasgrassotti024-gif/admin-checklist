<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard - Checklists</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --primary:#0078ff;
  --accent:#00b4ff;
  --bg:#ffffff;
  --white:#ffffff;
  --text:#1a1a1a;
  --muted:#666;
  --card:#ffffff;
  --border:#e3e6eb;
  --shadow:0 8px 28px rgba(0,0,0,0.08);
}
.dark {
  --bg:#0b1120;
  --white:#111827;
  --card:#111827;
  --text:#e9eef5;
  --muted:#a7b0bc;
  --border:#1f2937;
  --shadow:0 4px 16px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;font-family:"Inter",sans-serif;transition:background-color .25s ease,color .25s ease,border-color .25s ease;}
body{margin:0;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;}

/* ===== LAYOUT ===== */

.layout{
    display:flex;
    min-height:100vh;
}

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:250px;
    height:100vh;
    background:#0b1120;
    color:#fff;
    padding:25px 20px;
    display:flex;
    flex-direction:column;
    overflow-y:auto;
    z-index:1000;
}

.sidebar h2{
    margin:0 0 35px;
    text-align:center;
    font-size:28px;
    color:white;
}

.sidebar h4{
    margin:28px 0 12px;
    color:#7b8794;
    font-size:11px;
    letter-spacing:2px;
    font-weight:700;
}

.sidebar a{
    color:#d1d5db;
    text-decoration:none;
    padding:12px 15px;
    border-radius:10px;
    margin-bottom:8px;
    display:flex;
    align-items:center;
    transition:.2s;
    font-weight:500;
}

.sidebar a:hover{
    background:#1b2942;
    transform:translateX(5px);
}

.sidebar a.active{
    background:linear-gradient(90deg,#0078ff,#00b4ff);
    color:#fff;
    font-weight:700;
    box-shadow:0 4px 12px rgba(0,120,255,.35);
}

.conteudo{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
    margin-left:250px;
}
  
header{
  backdrop-filter:blur(14px);
  background:var(--white);
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 26px;position:sticky;top:0;z-index:10;
  border-bottom:1px solid var(--border);
  box-shadow:var(--shadow);
}
.dark header{
  background:var(--card);
}
h1{font-family:"Outfit";font-weight:800;font-size:1.2rem;color:var(--primary);margin:0;}
.dark h1{color:#66b2ff;}

#themeToggle{
  cursor:pointer;background:var(--card);border:1px solid var(--border);
  border-radius:50%;width:36px;height:36px;font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;
}
.dark #themeToggle{background:var(--white);color:var(--primary);}
#datetime{font-size:.85rem;color:var(--muted);margin-left:12px;}

.wrap{
    max-width:1600px;
    width:95%;
    margin:auto;
    padding:24px;
    flex:1;
}
  
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card-grande{
    grid-column:1 / -1;
    min-height:650px;
}

.card-grande canvas{
    height:560px !important;
} 

.card{
    min-height:520px;
}

.card canvas{
    width:100% !important;
    height:430px !important;
}
  
.card{
  background:var(--white);
  border-radius:14px;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
  padding:20px;
  text-align:center;
}
.dark .card{background:var(--card);}



  .topo-dashboard{
    display:flex;
    gap:20px;
    margin-bottom:24px;
    align-items:stretch;
}

.filtro-card{
    width:280px;
    background:var(--white);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.filtro-card label{
    font-weight:700;
    margin-bottom:10px;
}

.filtro-card select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid var(--border);
    font-size:15px;
    background:var(--bg);
    color:var(--text);
}

.total-card{
    flex:1;
    text-align:center;
    background:linear-gradient(135deg,var(--primary),var(--accent));
    color:#fff;
    border-radius:16px;
    padding:24px;
    box-shadow:0 6px 20px rgba(0,120,255,.4);
    font-family:"Outfit";
    font-weight:700;
}
  
.total-card span {
  display:block;
  font-size:2.5rem;
  font-weight:800;
  margin-top:10px;
}

footer{
  text-align:center;
  padding:14px;
  color:var(--muted);
  font-size:.85rem;
  background:var(--white);
  border-top:1px solid var(--border);
  box-shadow:0 -2px 8px rgba(0,0,0,0.05);
}
.dark footer{background:var(--card);}

/* RESPONSIVO */
@media (max-width: 800px){
  .wrap{padding:20px 18px;}
  header{padding:12px 18px;}
}
  
@media (max-width: 480px){
  header{padding:10px 12px;}
  h1{font-size:1.05rem;}
  #themeToggle{width:34px;height:34px;font-size:1rem;}
  .wrap{padding:18px 12px;}
}


  
</style>
</head>
<body>
  
<div class="layout">

<aside class="sidebar">

<h2>🚗 Sistema</h2>

<a href="dashboard.html" class="active">📊 Dashboard</a>

</aside>

<div class="conteudo">

<header>

<h1>Dashboard</h1>

<div style="display:flex;align-items:center;gap:14px;">

<span id="datetime"></span>

<button id="themeToggle">🌙</button>

</div>

</header>

<div class="wrap">

<div class="topo-dashboard">

    <div class="total-card">
        Total de Checklists
        <span id="totalChecklists">0</span>
    </div>

    <div class="filtro-card">
        <label for="filtroMes">Mês</label>

        <select id="filtroMes">
            <option value="">Todos</option>
            <option value="0">Janeiro</option>
            <option value="1">Fevereiro</option>
            <option value="2">Março</option>
            <option value="3">Abril</option>
            <option value="4">Maio</option>
            <option value="5">Junho</option>
            <option value="6">Julho</option>
            <option value="7">Agosto</option>
            <option value="8">Setembro</option>
            <option value="9">Outubro</option>
            <option value="10">Novembro</option>
            <option value="11">Dezembro</option>
        </select>
    </div>

</div>

 <div class="grid">

    <div class="card">
        <h3>🚛 Veículos com mais problemas</h3>
        <canvas id="chartVeiculos"></canvas>
    </div>

    <div class="card">
        <h3>📊 Pareto de defeitos</h3>
        <canvas id="chartPareto"></canvas>
    </div>

    <div class="card card-grande">
        <h3>📈 Evolução semanal</h3>
        <canvas id="chartSemanal"></canvas>
    </div>

</div>

</div>


<footer>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCxI5gx0LS0ny2y6UnPUCyW0zf1BjnTSco",
  authDomain: "checklist-rss3.firebaseapp.com",
  projectId: "checklist-rss3",
  storageBucket: "checklist-rss3.appspot.com",
  messagingSenderId: "179261205524",
  appId: "1:179261205524:web:376152c3b94fb115f14b01",
  measurementId: "G-47CPMQ3ZTC"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

<script>
/* DATA E TEMA */
setInterval(()=>{
  document.getElementById("datetime").textContent = new Date().toLocaleString("pt-BR",{timeZone:"America/Sao_Paulo"});
},1000);

const toggle=document.getElementById("themeToggle");
if(localStorage.getItem("tema")==="dark"){document.body.classList.add("dark");toggle.textContent="☀️";}
toggle.onclick=()=>{
  document.body.classList.toggle("dark");
  const dark=document.body.classList.contains("dark");
  toggle.textContent=dark?"☀️":"🌙";
  localStorage.setItem("tema",dark?"dark":"light");
};

/* === BUSCAR CHECKLISTS DO FIRESTORE === */
async function getChecklists(){
  try{
    const snap = await db.collection('checklists').get();
    return snap.docs.map(doc=>doc.data());
  }catch(err){
    console.error('Erro ao carregar checklists no dashboard:', err);
    return [];
  }
}

(async function initDashboard(){
  const checklists = await getChecklists();

  document.getElementById("totalChecklists").textContent = checklists.length;

  criarGraficoVeiculos(checklists);
criarGraficoPareto(checklists);
criarGraficoSemanal(checklists);

})();

function criarGraficoVeiculos(checklists){

    const veiculos = {};

    checklists.forEach(checklist => {

        const placa = checklist.placa || "Sem placa";

        if(!veiculos[placa]){
            veiculos[placa] = 0;
        }

        if(checklist.itens){

            Object.values(checklist.itens).forEach(status => {

                if(status === "Ruim"){
                    veiculos[placa]++;
                }

            });

        }

    });

    const ranking = Object.entries(veiculos)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,10);

    new Chart(document.getElementById("chartVeiculos"),{

        type:"bar",

        data:{
            labels: ranking.map(v=>v[0]),
            datasets:[{
                label:"Ocorrências",
                data: ranking.map(v=>v[1])
            }]
        },

        options:{
            indexAxis:"y",
            responsive:true,
            plugins:{
                legend:{
                    display:false
                }
            },
            scales:{
                x:{
                    beginAtZero:true
                }
            }
        }

    });

}

function criarGraficoPareto(checklists){

    const defeitos = {};

    checklists.forEach(checklist=>{

        if(!checklist.itens) return;

        Object.entries(checklist.itens).forEach(([item,status])=>{

            if(status==="Ruim"){

                if(!defeitos[item]){
                    defeitos[item]=0;
                }

                defeitos[item]++;

            }

        });

    });

    const ranking = Object.entries(defeitos)
        .sort((a,b)=>b[1]-a[1]);

    const labels = ranking.map(i=>i[0]);
    const valores = ranking.map(i=>i[1]);

    const total = valores.reduce((a,b)=>a+b,0);

if(total === 0){
    return;
}

    let soma = 0;

    const acumulado = valores.map(v=>{
        soma += v;
        return (soma/total)*100;
    });

    new Chart(document.getElementById("chartPareto"),{

        data:{

            labels:labels,

            datasets:[

                {
                    type:"bar",
                    label:"Ocorrências",
                    data:valores
                },

                {
                    type:"line",
                    label:"Acumulado %",
                    data:acumulado,
                    yAxisID:"y1"
                }

            ]

        },

        options:{

            responsive:true,

            scales:{

                y:{
                    beginAtZero:true
                },

                y1:{
                    position:"right",
                    min:0,
                    max:100
                }

            }

        }

    });

} 

function criarGraficoSemanal(checklists){

    const semanas = {};

    checklists.forEach(checklist=>{

        if(!checklist.data || !checklist.itens) return;

        const data = new Date(checklist.data);

        if(isNaN(data)) return;

        const inicioAno = new Date(data.getFullYear(),0,1);

        const dias = Math.floor((data - inicioAno)/(1000*60*60*24));

        const semana = Math.ceil((dias + inicioAno.getDay() + 1)/7);

        const chave = `${data.getFullYear()}-S${semana}`;

        if(!semanas[chave]){
            semanas[chave]={
                OK:0,
                Regular:0,
                Ruim:0
            };
        }

        Object.values(checklist.itens).forEach(status=>{

            if(status==="OK"){
                semanas[chave].OK++;
            }

            else if(status==="Regular"){
                semanas[chave].Regular++;
            }

            else if(status==="Ruim"){
                semanas[chave].Ruim++;
            }

        });

    });

    const labels = Object.keys(semanas).sort();

    const ok = labels.map(s=>semanas[s].OK);
    const regular = labels.map(s=>semanas[s].Regular);
    const ruim = labels.map(s=>semanas[s].Ruim);

    new Chart(document.getElementById("chartSemanal"),{

        type:"line",

        data:{

            labels:labels,

            datasets:[

                {
                    label:"OK",
                    data:ok,
                    borderColor:"green",
                    backgroundColor:"green",
                    tension:.3
                },

                {
                    label:"Regular",
                    data:regular,
                    borderColor:"orange",
                    backgroundColor:"orange",
                    tension:.3
                },

                {
                    label:"Ruim",
                    data:ruim,
                    borderColor:"red",
                    backgroundColor:"red",
                    tension:.3
                }

            ]

        },

        options:{

            responsive:true,

            interaction:{
                mode:"index",
                intersect:false
            },

            scales:{
                y:{
                    beginAtZero:true
                }
            }

        }

    });

}

  
  
</script>
</div>

</div>
